<!DOCTYPE html>

        .main-table {
            width: 900px;

            font-size: 14px;
        }

        }
        a {
            color: blue;
            text-decoration: none;
            line-height: 1.8;
        }
        a:hover {
            text-decoration: underline;

        .profile-img {

            margin: 15px 0;
