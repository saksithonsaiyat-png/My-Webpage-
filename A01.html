<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลนักเรียน - A01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .slide-in { animation: slideIn 1s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-gradient-to-tr from-emerald-400 to-teal-700 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden max-w-4xl w-full slide-in flex flex-col md:flex-row">
        
        <!-- ฝั่งซ้าย: รูปภาพ -->
        <div class="md:w-1/2 bg-gray-100">
            <!-- รูปภาพ im2.jpg -->
            <img src="im2.jpg" alt="[รูปภาพนักฟุตบอล]" 
                 onerror="this.src='https://via.placeholder.com/600x800?text=im2.jpg+Missing'"
                 class="h-full w-full object-cover">
        </div>

        <!-- ฝั่งขวา: ข้อมูล -->
        <div class="md:w-1/2 p-10 flex flex-col justify-center">
            <div class="mb-8">
                <span class="bg-teal-100 text-teal-700 px-3 py-1 rounded-full text-sm font-bold uppercase tracking-wider">Student Profile</span>
                <h1 class="text-3xl font-bold text-gray-800 mt-4 mb-2">นายศักดิ์ศิธร ไสยาสน์</h1>
                <p class="text-xl text-teal-600 font-medium">ระดับชั้น ปวช. 2</p>
                <hr class="mt-6 border-teal-100">
            </div>

            <div class="text-gray-600 mb-10 leading-relaxed">
                <p>ยินดีต้อนรับเข้าสู่หน้าข้อมูลส่วนตัว หน้าเว็บนี้ถูกเชื่อมโยงมาจากหน้าหลักเพื่อแสดงผลข้อมูลนักเรียนตามโจทย์กิจกรรม</p>
            </div>

            <!-- ปุ่มกลับหน้าแรก -->
            <div class="flex flex-col gap-3">
                <a href="index.html" class="border-2 border-teal-600 text-teal-600 hover:bg-teal-600 hover:text-white font-bold py-3 px-6 rounded-xl transition duration-300 text-center">
                    ← กลับไปหน้าหลัก
                </a>
                <a href="https://www.facebook.com" target="_blank" class="text-center text-sm text-gray-400 hover:text-teal-500">
                    ติดต่อสอบถามเพิ่มเติม
                </a>
            </div>
        </div>
    </div>

</body>
</html>
