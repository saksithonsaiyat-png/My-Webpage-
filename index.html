<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าหลัก</title>
    <style>
        body {
            background-color: #d1eff7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
           
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        
        .banner-container {
            width: 800px;
            height: 250px;
            background-color: #0b1c4a; 
            display: flex;
            align-items: center;
            border: 2px solid #000;
        }
        
        .banner-image {
            width: 45%;
            height: 100%;
            object-fit: cover;
        }
        
        .banner-text {
            width: 55%;
            color: #ffcc00; 
            font-size: 65px;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-shadow: 2px 2px 4px #000000;
            margin: 0;
            text-align: center;
        }
        
        .enter-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 40px;
            background: linear-gradient(to right, #6bc5e8, #3b8cd4);
            color: white;
            text-decoration: none;
            font-size: 18px;
            border: 1px solid #005580;
            border-radius: 2px;
        }
        
        .enter-btn:hover {
            background: linear-gradient(to right, #3b8cd4, #6bc5e8);
        }
    </style>
</head>
<body>

 
    <div class="banner-container">
        <!-- ใส่รูป im1.jpg -->
        <img src="im1.jpg" alt="[รูปภาพหน้าแรก]" class="banner-image">
        <h1 class="banner-text">WELCOME</h1>
    </div>

  
    <a href="A01.html" class="enter-btn">เข้าสู่เว็บไซต์ &gt;&gt;</a>

</body>
</html>
